name: football_agent_mate
description: Football Agent Mate — A mobile app for football agents
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_app_check: ^0.4.1+4
  firebase_analytics: ^12.1.2
  firebase_crashlytics: ^5.0.7
  firebase_messaging: ^16.1.1
  firebase_remote_config: ^6.1.4
  firebase_performance: ^0.11.1+4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6

  # Auth
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # HTTP
  dio: ^5.8.0+1
  firebase_performance_dio: ^0.7.1

  # Local Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Formatting
  intl: any

  # URL Launcher
  url_launcher: ^6.3.1

  # Connectivity
  connectivity_plus: 7.0.0

  # Biometric Auth
  local_auth: ^2.3.0

  # Environment
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1
  mockito: ^5.4.5
  fake_cloud_firestore: ^4.0.1
  fake_async: ^1.3.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env.development
    - .env.production
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"